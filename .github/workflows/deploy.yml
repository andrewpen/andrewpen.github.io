name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Deploy to gh-pages
        run: |
          git config --global user.name "Andrew Pendleton"
          git config --global user.email "andrew.d.pendleton@gmail.com"
          git fetch origin gh-pages:gh-pages
          git checkout gh-pages
          git pull origin gh-pages
          git merge origin/main --allow-unrelated-histories -X theirs --no-edit -m "Deploy: merge main into gh-pages"
          git push origin gh-pages
